# ML Pipeline Configuration for Sanskrit Cipher

# Database settings
database:
  path: "../web/web-canvas/electron/resources/database/fragments.db"

# Data directory containing fragment images (relative to pipeline root)
data_dir: "../web/web-canvas/data"

# Cache directory for generated files
cache_dir: "../web/web-canvas/electron/resources/cache"

# Logging configuration
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  file: "logs/pipeline.log"
  console: true

# Processor configurations
# Set enabled: false to disable a processor
processors:
  segmentation:
    enabled: true
    model_path: "../models/segmentation/best.pt"
    config:
      confidence_threshold: 0.25
      iou_threshold: 0.45
      model_version: "1.0"

  classification:
    enabled: false  # Disabled - replaced by linedetection processor
    model_path: "../models/classification/best_model.pt"
    meta_path: "../models/classification/meta.json"
    config:
      batch_size: 16
      model_version: "1.0"

  scripttypeclassification:
    enabled: true
    model_path: "../models/script_type/best_model.pt"
    meta_path: "../models/script_type/metadata.yaml"
    config:
      batch_size: 16
      model_version: "2.0"
      confidence_threshold: 0.0  # Set to 0 to accept all predictions
      skip_processed: true  # Skip already-processed fragments

  scaledetection:
    enabled: true
    # No model_path needed (uses EasyOCR + computer vision)
    config:
      model_version: "1.0"
      visualize: true  # Save debug images showing detected ticks
      visualize_output_dir: "../scale_detection_feature/debug_visualizations"
      skip_processed: true  # Skip already-processed fragments
      ocr_enabled: true  # Use EasyOCR for unit detection
  
  circledetection:
    enabled: true
    model_path: "../models/circle-classification/best.pt"
    config:
      confidence_threshold: 0.25
      model_version: "1.0"

  edgedetection:
    enabled: true
    model_path: "../models/edge-classification/best.pt"
    meta_path: "../models/edge-classification/metadata.json"
    config:
      model_version: "2.0"
      edge_method: "edge_classifier"  # "edge_classifier" | "hull_segments" | "bbox_runs" | "oriented_runs" | "oriented_runs_scaled"
      classifier_device: "auto"
      classifier_fallback_method: "oriented_runs"
      near_frac: 0.05
      min_run_frac: 0.05
      max_mean_line_err: 12.0
      hull_err_thresh: 3.5
      hull_min_len_pts: 35
      hull_min_cov: 0.45
      hull_max_err: 4.5
      hull_near_frac: 0.06
      hull_angle_h: 12.0
      hull_angle_v: 78.0
      oriented_near_frac: 0.04
      oriented_min_run_frac: 0.40
      oriented_max_line_err_frac: 0.02
      oriented_max_side_offset_frac: 0.025
      oriented_angle_tol_deg: 18.0
      oriented_min_confidence: 0.60
      oriented_smoothing_window: 7
      oriented_trim_frac: 0.10
      oriented_scaled_target_pixels_per_unit: 100.0
      oriented_scaled_crop_pad: 4
      oriented_scaled_max_dimension: 8192
  linedetection:
    enabled: true
    model_path: "../models/line-detection/best.pt"
    config:
      confidence_threshold: 0.25
      iou_threshold: 0.45
      model_version: "1.0"
      skip_processed: true  # Skip already-processed fragments

  embedding:
    enabled: true
    # No model_path needed (uses torch.hub to download DINOv2)
    config:
      model_version: "dinov2-s-1.0"
      skip_processed: true  # Skip fragments already embedded with same version


# Processing options
processing:
  # Continue processing even if individual fragments fail
  continue_on_error: true

  # Skip fragments already processed with the same model version
  skip_processed: true

  # Save progress checkpoint every N fragments
  checkpoint_interval: 100

  # Number of parallel workers (future enhancement)
  num_workers: 1
